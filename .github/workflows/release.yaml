name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Build release distributions
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Set up uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: false

      - name: Check release tag matches package version
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          package_version="$(uv version --short)"
          expected_tag="v${package_version}"
          if [ "${GITHUB_REF_NAME}" != "${expected_tag}" ]; then
            echo "Release tag ${GITHUB_REF_NAME} does not match package version ${package_version}."
            echo "Expected tag: ${expected_tag}"
            exit 1
          fi

      - name: Install dependencies
        run: uv sync --locked --dev

      - name: Build distributions
        run: uv run poe build

      - name: Check distributions
        run: uvx twine check --strict dist/*

      - name: Smoke test wheel install
        run: |
          python -m venv /tmp/quantleet-release-smoke
          /tmp/quantleet-release-smoke/bin/python -m pip install --upgrade pip
          /tmp/quantleet-release-smoke/bin/python -m pip install dist/*.whl
          /tmp/quantleet-release-smoke/bin/python -c "import quantleet; print('release smoke passed')"

      - name: Upload distributions
        uses: actions/upload-artifact@v7
        with:
          name: release-distributions
          path: dist/*
          if-no-files-found: error

  publish:
    name: Publish to PyPI
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment: pypi
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Download distributions
        uses: actions/download-artifact@v8
        with:
          name: release-distributions
          path: dist/

      - name: Publish distributions to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
